stages:
  - test
  - validate
  - build

.python:
  image: python:${PYVER}-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends make
    - make setup
  variables:
    PYVER: "3.12"
  cache:
    key: pip-$PYVER
    paths:
      - .cache/pip

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

check:
  extends: .python
  stage: test
  parallel:
    matrix:
      - PYVER: ["3.11", "3.12"]
  script:
    - make check-local
    - make cov
  coverage: '/TOTAL.*\s(\d+%)$/'
  artifacts:
    when: always
    expire_in: 30 days

typecheck:
  extends: .python
  stage: test
  script:
    - make typecheck

e2e:chrome:
  image: docker:29
  stage: test
  services:
    - docker:29-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build -t cdpx-ci .
    - mkdir -p .proof
    - docker run --rm -v "$PWD/.proof:/workspace/.proof" cdpx-ci make test-e2e
  artifacts:
    when: always
    paths:
      - .proof/
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_TAG

e2e:symfony:
  image: docker:29
  stage: test
  services:
    - docker:29-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache make
  script:
    - make docker-symfony-e2e
  artifacts:
    when: always
    paths:
      - .proof/
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_TAG

proof:
  image: docker:29
  stage: validate
  services:
    - docker:29-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  needs: ["check", "e2e:chrome", "e2e:symfony"]
  before_script:
    - apk add --no-cache chromium make python3 py3-pip
    - python3 -m pip install -e ".[dev]" --break-system-packages
  script:
    - make proof
  artifacts:
    when: always
    paths:
      - .proof/
    reports:
      junit:
        - .proof/unit-junit.xml
        - .proof/e2e-junit.xml
        - .proof/symfony-e2e-junit.xml
    expire_in: 90 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_TAG

build:
  extends: .python
  stage: build
  needs: ["check", "e2e:chrome", "e2e:symfony", "proof"]
  script:
    - make dist
    - pip install dist/*.whl
    - cdpx --version
  artifacts:
    paths:
      - dist/
    expire_in: 90 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_TAG
