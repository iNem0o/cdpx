version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 3
    commit-message:
      prefix: "build"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    commit-message:
      prefix: "build"
  - package-ecosystem: docker
    directory: "/tests/symfony-app"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    commit-message:
      prefix: "build"
