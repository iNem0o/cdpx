version: 2

updates:
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    groups:
      compatible:
        patterns: ["*"]
        update-types: [minor, patch]
    commit-message:
      prefix: "build"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    groups:
      compatible:
        patterns: ["*"]
        update-types: [minor, patch]
    commit-message:
      prefix: "ci"

  - package-ecosystem: docker
    directories:
      - "/"
      - "/packaging"
      - "/tests/symfony-app"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      compatible:
        patterns: ["*"]
        update-types: [minor, patch]
    commit-message:
      prefix: "build"

  - package-ecosystem: composer
    directory: "/tests/symfony-app"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    groups:
      compatible:
        patterns: ["*"]
        update-types: [minor, patch]
    commit-message:
      prefix: "build"
