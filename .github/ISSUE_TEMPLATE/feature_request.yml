name: Proposer une évolution
description: Proposer une primitive, une amélioration CLI ou un use case documenté.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Quel problème concret cette évolution résout-elle pour l'agent ou le développeur ?
    validations:
      required: true
  - type: textarea
    id: proposed-contract
    attributes:
      label: Contrat CLI proposé
      description: Donnez si possible la commande, l'objet JSON attendu et les codes de sortie.
      render: shell
    validations:
      required: true
  - type: textarea
    id: protocol
    attributes:
      label: Protocole et validation
      description: Commandes CDP attendues, scénario mock et éventuelle fixture Chrome réelle.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives envisagées
      description: Décrivez les contournements ou primitives existantes déjà essayés.
  - type: checkboxes
    id: definition-of-done
    attributes:
      label: Definition of Done d'une primitive
      options:
        - label: La primitive et sa sous-commande CLI sont définies.
          required: true
        - label: L'objet JSON, stderr et les codes de sortie 0/1/2 sont définis, y compris en cas d'évolution du contrat.
          required: true
        - label: Le protocole mock exact et les tests de sortie + protocole sont prévus.
          required: true
        - label: La fixture et le scénario Chrome ou Symfony E2E sont prévus, ou leur absence est motivée.
          required: true
        - label: docs/PRIMITIVES.md et la fiche feature concernée seront mises à jour.
          required: true
        - label: Le scénario peut être testé sans connexion à un Chrome personnel.
          required: true
