name: Propose an evolution
description: Propose a primitive, a CLI improvement or a documented use case.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What concrete problem does this evolution solve for the agent or the developer?
    validations:
      required: true
  - type: textarea
    id: proposed-contract
    attributes:
      label: Proposed CLI contract
      description: If possible, give the command, the expected JSON object and the exit codes.
      render: shell
    validations:
      required: true
  - type: textarea
    id: protocol
    attributes:
      label: Protocol and validation
      description: Expected CDP commands, mock scenario and real Chrome fixture if any.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe the workarounds or existing primitives already tried.
  - type: checkboxes
    id: definition-of-done
    attributes:
      label: Definition of Done of a primitive
      options:
        - label: The primitive and its CLI subcommand are defined.
          required: true
        - label: The JSON object, stderr and the 0/1/2 exit codes are defined, including for a contract evolution.
          required: true
        - label: The exact mock protocol and the output + protocol tests are planned.
          required: true
        - label: The Chrome or Symfony E2E fixture and scenario are planned, or their absence is justified.
          required: true
        - label: docs/PRIMITIVES.md and the affected feature sheet will be updated.
          required: true
        - label: The scenario can be tested without connecting to a personal Chrome.
          required: true
