name: Report a bug
description: Report a reproducible cdpx behavior.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please provide a minimal reproducible case without any secret, cookie or session data.
  - type: textarea
    id: command
    attributes:
      label: Command run
      description: Give the exact command after removing any sensitive value.
      render: shell
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Observed behavior
      description: Describe what happened and the result you got.
      placeholder: cdpx returns…
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe the expected result.
    validations:
      required: true
  - type: textarea
    id: stdout-stderr
    attributes:
      label: Redacted stdout and stderr
      description: Paste the useful outputs without any cookie, token, header or session data.
      render: shell
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Commands, local fixture and required steps. Redact any sensitive value.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: cdpx version
      description: Output of `cdpx --version`.
      placeholder: cdpx 0.1.0
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chromium
        - Google Chrome
        - Not applicable
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS and version, Python, Chrome/Chromium and Docker mode if any.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Checks
      options:
        - label: I removed secrets, cookies and session data from this report.
          required: true
        - label: I checked that no open issue already describes this problem.
          required: true
