name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY_IMAGE: ghcr.io/inem0o/cdpx
  # Hosted runners use the plain docker buildx driver, which cannot export a
  # local cache directory.
  DEV_CACHE: "0"

jobs:
  core:
    name: Core / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run the containerized local gate
        run: ./dev check-local
      - name: Verify the native bundle
        run: |
          ./dev image
          docker run --rm --entrypoint /opt/cdpx/bin/native-cdpx cdpx-runtime:dev --version

  full:
    name: Full Chrome / Symfony / proof gate
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      PROOF_ARTIFACT_NAME: proof-${{ github.run_id }}-${{ github.run_attempt }}
      CDPX_PROOF_RETENTION_DAYS: "14"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run the canonical gate
        id: gate
        run: ./dev check
      - name: Publish the native summary
        if: ${{ always() }}
        env:
          RELEASE_OUTCOME: ${{ steps.gate.outcome }}
        run: |
          summary_path=".proof/validation-summary.json"
          if [ ! -f "$summary_path" ] && [ -f ".proof.new/validation-summary.json" ]; then
            summary_path=".proof.new/validation-summary.json"
          fi
          docker run --rm --entrypoint python \
            --mount "type=bind,source=$PWD,target=$PWD" --workdir "$PWD" \
            cdpx-dev:local scripts/github_summary.py \
            --summary "$summary_path" \
            --artifact-name "$PROOF_ARTIFACT_NAME" \
            --release-outcome "$RELEASE_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload shareable proof
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.PROOF_ARTIFACT_NAME }}
          path: .proof/shareable/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14

  launcher-macos:
    name: Launcher / macOS beta
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Validate POSIX launcher behavior
        run: sh tests/test_launcher.sh

  candidate:
    name: Candidate / ${{ matrix.arch }}
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [core, full, launcher-macos]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Authenticate to GHCR
        env:
          GH_TOKEN: ${{ github.token }}
        run: printf '%s' "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Create a container-backed builder for attestations
        run: docker buildx create --use --driver docker-container
      - name: Build and push immutable architecture candidate
        run: |
          docker buildx build --push --provenance=true --sbom=true \
            --target runtime \
            --build-arg "VERSION=0.1.2" \
            --build-arg "REVISION=$GITHUB_SHA" \
            --tag "$REGISTRY_IMAGE:sha-$GITHUB_SHA-${{ matrix.arch }}" .
      - name: Export embedded bundle from the same source
        run: |
          mkdir -p candidate/opt
          docker pull "$REGISTRY_IMAGE:sha-$GITHUB_SHA-${{ matrix.arch }}"
          container="$(docker create "$REGISTRY_IMAGE:sha-$GITHUB_SHA-${{ matrix.arch }}")"
          docker cp "$container:/opt/cdpx" candidate/opt/cdpx
          docker rm "$container"
          tar -C candidate -czf "cdpx-embedded-linux-${{ matrix.arch }}.tar.gz" opt/cdpx
      - name: Upload embedded candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: candidate-embedded-${{ matrix.arch }}
          path: cdpx-embedded-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error
          retention-days: 30

  candidate-manifest:
    name: Candidate / manifest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [candidate]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Authenticate to GHCR
        env:
          GH_TOKEN: ${{ github.token }}
        run: printf '%s' "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Assemble the immutable multi-architecture candidate
        run: |
          docker buildx imagetools create \
            --tag "$REGISTRY_IMAGE:sha-$GITHUB_SHA" \
            "$REGISTRY_IMAGE:sha-$GITHUB_SHA-amd64" \
            "$REGISTRY_IMAGE:sha-$GITHUB_SHA-arm64"
          docker buildx imagetools inspect "$REGISTRY_IMAGE:sha-$GITHUB_SHA" --format '{{json .}}' \
            > candidate.json
      - name: Upload candidate identity
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: candidate-identity
          path: candidate.json
          if-no-files-found: error
          retention-days: 30

  dependency-review:
    name: Security / dependency review
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Reject vulnerable dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate

  required:
    name: PR Gate / Required
    if: ${{ always() }}
    needs: [core, full, launcher-macos, dependency-review]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require every validation job
        env:
          CORE: ${{ needs.core.result }}
          FULL: ${{ needs.full.result }}
          MACOS: ${{ needs.launcher-macos.result }}
          DEPENDENCY_REVIEW: ${{ needs.dependency-review.result }}
        run: |
          test "$CORE" = success
          test "$FULL" = success
          test "$MACOS" = success
          test "$DEPENDENCY_REVIEW" = success || test "$DEPENDENCY_REVIEW" = skipped
