name: CI

on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  python-compat:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install development dependencies
        run: make setup
      - name: Run the local quality gate
        run: make check-local
      - name: Enforce coverage
        run: make cov

  release-gate:
    name: Full release gate
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      PROOF_ARTIFACT_NAME: pr-proof-${{ github.run_id }}-${{ github.run_attempt }}
      CDPX_PROOF_RETENTION_DAYS: "14"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install development dependencies
        run: make setup
      - name: Run Docker, Chrome, Symfony, proof, and distribution gates
        id: release
        run: make release
      - name: Build the native GitHub summary
        if: ${{ always() }}
        env:
          RELEASE_OUTCOME: ${{ steps.release.outcome }}
        shell: bash
        run: |
          set -o pipefail
          # A `make proof` failure leaves the (already redacted) summary in
          # the transactional staging .proof.new/: read it locally then.
          # .proof.new is NEVER uploaded as an artifact — it may contain
          # non-shareable evidence; only this step reads it.
          summary_path=".proof/validation-summary.json"
          if [ ! -f "${summary_path}" ] && [ -f ".proof.new/validation-summary.json" ]; then
            summary_path=".proof.new/validation-summary.json"
          fi
          python scripts/github_summary.py \
            --summary "${summary_path}" \
            --artifact-name "${PROOF_ARTIFACT_NAME}" \
            --release-outcome "${RELEASE_OUTCOME}" \
            | tee -a "${GITHUB_STEP_SUMMARY}"
      - name: Upload proof cockpit and diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.PROOF_ARTIFACT_NAME }}
          path: .proof/shareable/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14

  required:
    name: PR Gate / Required
    if: ${{ always() }}
    needs:
      - python-compat
      - release-gate
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require every validation job
        env:
          PYTHON_COMPAT_RESULT: ${{ needs.python-compat.result }}
          RELEASE_GATE_RESULT: ${{ needs.release-gate.result }}
        run: |
          test "${PYTHON_COMPAT_RESULT}" = "success"
          test "${RELEASE_GATE_RESULT}" = "success"
