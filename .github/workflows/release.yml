name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY_IMAGE: ghcr.io/inem0o/cdpx

jobs:
  promote:
    name: Approve and promote verified candidate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment:
      name: release
      url: https://github.com/${{ github.repository }}/pkgs/container/cdpx
    permissions:
      actions: read
      contents: write
      packages: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify tag, version, and ancestry
        run: |
          case "$GITHUB_REF_NAME" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) exit 1 ;;
          esac
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -1)"
          test "v$version" = "$GITHUB_REF_NAME"
          git merge-base --is-ancestor "$GITHUB_SHA" origin/master
      - name: Locate the successful candidate workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id="$(gh run list --workflow ci.yml --commit "$GITHUB_SHA" \
            --status success --json databaseId --jq '.[0].databaseId')"
          test -n "$run_id"
          printf 'CANDIDATE_RUN=%s\n' "$run_id" >> "$GITHUB_ENV"
      - name: Authenticate to GHCR
        env:
          GH_TOKEN: ${{ github.token }}
        run: printf '%s' "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Resolve and promote without rebuilding
        run: |
          candidate="$REGISTRY_IMAGE:sha-$GITHUB_SHA"
          digest="sha256:$(docker buildx imagetools inspect "$candidate" --raw | sha256sum | awk '{print $1}')"
          test -n "$digest"
          version="${GITHUB_REF_NAME#v}"
          major="${version%%.*}"
          rest="${version#*.}"
          minor="${rest%%.*}"
          for tag in "$version" "$major.$minor" "$major" latest; do
            docker buildx imagetools create --tag "$REGISTRY_IMAGE:$tag" \
              "$REGISTRY_IMAGE@$digest"
          done
          printf 'IMAGE_DIGEST=%s\n' "$digest" >> "$GITHUB_ENV"
      - name: Download candidate assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh run download "$CANDIDATE_RUN" -n candidate-embedded-amd64 -D dist
          gh run download "$CANDIDATE_RUN" -n candidate-embedded-arm64 -D dist
      - name: Bake digest into the portable launcher
        run: |
          sed "s/__CDPX_IMAGE_DIGEST__/${IMAGE_DIGEST#sha256:}/" cdpx > dist/cdpx
          chmod 0755 dist/cdpx
          cp packaging/install dist/install
          chmod 0755 dist/install
          (cd dist && sha256sum cdpx cdpx-embedded-linux-*.tar.gz install > SHA256SUMS)
      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          previous="$(git describe --tags --abbrev=0 "$GITHUB_SHA^" 2>/dev/null || true)"
          set -- gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes
          if [ -n "$previous" ]; then
            set -- "$@" --notes-start-tag "$previous"
          fi
          "$@"
