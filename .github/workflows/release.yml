name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-verify:
    name: Build and verify tagged release
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      CDPX_PROOF_RETENTION_DAYS: "30"
    permissions:
      contents: read
    steps:
      - name: Checkout tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install development dependencies
        run: make setup
      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          PACKAGE_VERSION="$(python -c 'from cdpx import __version__; print(__version__)')"
          test "v${PACKAGE_VERSION}" = "${GITHUB_REF_NAME}"
      - name: Verify tagged commit belongs to master
        run: git merge-base --is-ancestor "${GITHUB_SHA}" origin/master
      - name: Run the complete release gate
        run: make release
      - name: Upload verified distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 90
      - name: Upload proof cockpit
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-proof
          path: .proof/shareable/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30

  publish-pypi:
    name: Publish to PyPI
    needs: build-and-verify
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/p/cdpx
    permissions:
      id-token: write
    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish distributions with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/
      - name: Create checksums
        run: (cd dist && sha256sum *) > SHA256SUMS
      - name: Create release from the existing tag
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          dist/* SHA256SUMS
          --verify-tag
          --generate-notes
