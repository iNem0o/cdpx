name: Pages

on:
  push:
    branches:
      - master
    paths:
      - "site/**"
      - "docs/AGENT-GUIDE.md"
      - "packaging/install"
      - "schemas/cdpx.schema.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

# One Pages deployment at a time; an in-flight deployment is not cancelled
# to avoid leaving the environment in an intermediate state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Publish the homepage
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Publish the stable installer endpoint
        run: |
          cp packaging/install site/install
          cp docs/AGENT-GUIDE.md site/agent-guide.md
          mkdir -p site/schema
          cp schemas/cdpx.schema.json site/schema/cdpx-v1.json
      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload the site artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
