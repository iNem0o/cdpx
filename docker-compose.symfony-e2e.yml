services:
  symfony:
    build:
      context: ./tests/symfony-app
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
    healthcheck:
      test: ["CMD", "php", "-r", "$$s=@fsockopen('127.0.0.1',8000); exit($$s?0:1);"]
      interval: 2s
      timeout: 2s
      retries: 30

  cdpx:
    build:
      context: .
    volumes:
      - ./.proof:/workspace/.proof
    environment:
      SYMFONY_E2E_URL: http://symfony:8000
      CDPX_E2E_UID: "${CDPX_E2E_UID:-1000}"
      CDPX_E2E_GID: "${CDPX_E2E_GID:-1000}"
      CDPX_PROOF_RETENTION_DAYS: "${CDPX_PROOF_RETENTION_DAYS:-14}"
    depends_on:
      symfony:
        condition: service_healthy
    command:
      [
        "/bin/sh",
        "-lc",
        "python3 -m pytest tests/e2e/test_e2e_symfony.py -v --cdpx-evidence-dir=.proof/evidence --cdpx-evidence-suite=symfony --junitxml=.proof/symfony-e2e-junit.xml; status=$$?; chown -R $${CDPX_E2E_UID}:$${CDPX_E2E_GID} .proof; exit $$status",
      ]
