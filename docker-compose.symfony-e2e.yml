services:
  symfony:
    build:
      context: ./tests/symfony-app
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
    healthcheck:
      test: ["CMD", "php", "-r", "$$s=@fsockopen('127.0.0.1',8000); exit($$s?0:1);"]
      interval: 2s
      timeout: 2s
      retries: 30

  cdpx:
    build:
      context: .
    volumes:
      # Parameterizable host target: `make proof` mounts its transactional
      # staging (.proof.new) via CDPX_PROOF_DIR; the default serves
      # `make docker-symfony-e2e`.
      - ${CDPX_PROOF_DIR:-./.proof}:/workspace/.proof
    environment:
      SYMFONY_E2E_URL: http://symfony:8000
      CDPX_E2E_UID: "${CDPX_E2E_UID:-1000}"
      CDPX_E2E_GID: "${CDPX_E2E_GID:-1000}"
      CDPX_PROOF_RETENTION_DAYS: "${CDPX_PROOF_RETENTION_DAYS:-14}"
    depends_on:
      symfony:
        condition: service_healthy
    # pytest runs in the background of the PID 1 shell so the TERM/INT trap
    # stays responsive: even a `compose down` during the run hands the volume
    # files back to the host UID (otherwise the staging purge fails as root).
    command:
      [
        "/bin/sh",
        "-lc",
        "cleanup() { chown -R $${CDPX_E2E_UID}:$${CDPX_E2E_GID} .proof; }; trap 'kill -TERM $$pid 2>/dev/null; wait $$pid; cleanup; exit 143' TERM INT; python3 -m pytest tests/e2e/test_e2e_symfony.py -v --cdpx-evidence-dir=.proof/evidence --cdpx-evidence-suite=symfony --junitxml=.proof/symfony-e2e-junit.xml & pid=$$!; wait $$pid; status=$$?; cleanup; exit $$status",
      ]
