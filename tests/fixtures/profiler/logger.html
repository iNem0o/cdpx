<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Symfony Profiler — logger</title></head>
<body>
<div id="sidebar">
  <ul id="menu-profiler">
    <li class="request"><a href="/_profiler/fixed-token?panel=request">Request / Response</a></li>
    <li class="time"><a href="/_profiler/fixed-token?panel=time">Performance</a></li>
    <li class="exception"><a href="/_profiler/fixed-token?panel=exception">Exception</a></li>
    <li class="logger"><a href="/_profiler/fixed-token?panel=logger">Logs <span class="count"><span>2</span></span></a></li>
    <li class="db"><a href="/_profiler/fixed-token?panel=db">Doctrine <span class="count"><span>6</span></span></a></li>
    <li class="twig"><a href="/_profiler/fixed-token?panel=twig">Twig</a></li>
    <li class="cache"><a href="/_profiler/fixed-token?panel=cache">Cache</a></li>
    <li class="http_client"><a href="/_profiler/fixed-token?panel=http_client">HTTP Client</a></li>
    <li class="messenger"><a href="/_profiler/fixed-token?panel=messenger">Messenger</a></li>
  </ul>
</div>
<div id="collector-content">
<h2>Log Messages</h2>
<div class="log-filters">
  <input type="radio" id="filter-log-type-all" name="filter-log-type" value="all">
  <label for="filter-log-type-all" class="tab-control">All messages</label>
  <input type="radio" id="filter-log-type-error" name="filter-log-type" value="error">
  <label for="filter-log-type-error" class="tab-control">Errors <span class="badge status-">0</span></label>
  <input type="radio" id="filter-log-type-deprecation" name="filter-log-type" value="deprecation" checked>
  <label for="filter-log-type-deprecation" class="tab-control">Deprecations <span class="badge status-warning">2</span></label>
</div>
</div>
</body>
</html>
