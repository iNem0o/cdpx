<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Symfony Profiler — http_client</title></head>
<body>
<div id="sidebar">
  <ul id="menu-profiler">
    <li class="request"><a href="/_profiler/fixed-token?panel=request">Request / Response</a></li>
    <li class="time"><a href="/_profiler/fixed-token?panel=time">Performance</a></li>
    <li class="exception"><a href="/_profiler/fixed-token?panel=exception">Exception</a></li>
    <li class="logger"><a href="/_profiler/fixed-token?panel=logger">Logs <span class="count"><span>2</span></span></a></li>
    <li class="db"><a href="/_profiler/fixed-token?panel=db">Doctrine <span class="count"><span>6</span></span></a></li>
    <li class="twig"><a href="/_profiler/fixed-token?panel=twig">Twig</a></li>
    <li class="cache"><a href="/_profiler/fixed-token?panel=cache">Cache</a></li>
    <li class="http_client"><a href="/_profiler/fixed-token?panel=http_client">HTTP Client</a></li>
    <li class="messenger"><a href="/_profiler/fixed-token?panel=messenger">Messenger</a></li>
  </ul>
</div>
<div id="collector-content">
<div id="summary">
  <span class="status-response-status-code">200</span>
</div>
<h2>HTTP Client</h2>
<div class="metrics">
  <div class="metric"><span class="value">1</span><span class="label">Total requests</span></div>
  <div class="metric"><span class="value">0</span><span class="label">Pending requests</span></div>
</div>
<div class="sf-tabs">
  <div class="tab">
    <h3 class="tab-title">http_client <span class="badge">1</span></h3>
    <div class="tab-content">
      <table class="sf-profiler-httpclient-requests">
        <thead>
          <tr>
            <th><span class="http-method">GET</span></th>
            <th class="full-width">http://127.0.0.1:8000/api/echo</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="2"><span class="font-normal status-response-status-code status-success">200</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</div>
</body>
</html>
